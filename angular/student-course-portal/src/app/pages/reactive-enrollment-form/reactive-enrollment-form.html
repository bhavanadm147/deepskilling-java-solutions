
<h1>Reactive Enrollment Form</h1>

<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()">

  <!-- Student Name -->

  <div>

    <label>Student Name:</label>

    <input
      type="text"
      formControlName="studentName">

    <span
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['required']
      ">
      Name is required
    </span>

    <span
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['minlength']
      ">
      Name must be at least 3 characters
    </span>

  </div>


  <br>


  <!-- Student Email -->

  <div>

    <label>Student Email:</label>

    <input
      type="email"
      formControlName="studentEmail">

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.touched &&
        enrollForm.get('studentEmail')?.errors?.['required']
      ">
      Email is required
    </span>

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.touched &&
        enrollForm.get('studentEmail')?.errors?.['email']
      ">
      Enter a valid email address
    </span>

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.errors?.['emailTaken']
      ">
      Email taken
    </span>

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.pending
      ">
      Checking email...
    </span>

  </div>


  <br>


  <!-- Course ID -->

  <div>

    <label>Course ID:</label>

    <input
      type="text"
      formControlName="courseId">

    <span
      *ngIf="
        enrollForm.get('courseId')?.touched &&
        enrollForm.get('courseId')?.errors?.['required']
      ">
      Course ID is required
    </span>

    <span
      *ngIf="
        enrollForm.get('courseId')?.errors?.['noCourseCode']
      ">
      Course code starting with XX is not allowed.
    </span>

  </div>


  <br>


  <!-- Semester -->

  <div>

    <label>Preferred Semester:</label>

    <select formControlName="preferredSemester">

      <option value="Odd">
        Odd
      </option>

      <option value="Even">
        Even
      </option>

    </select>

  </div>


  <br>


  <!-- Terms -->

  <div>

    <input
      type="checkbox"
      formControlName="agreeToTerms">

    <label>
      I agree to the terms and conditions
    </label>

  </div>


  <br>


  <!-- FormArray -->

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">
    Add Another Course
  </button>

<div formArrayName="additionalCourses">

  <div *ngFor="let ctrl of additionalCourses.controls; let i = index">

    <input
      type="text"
      [formControlName]="i"
      placeholder="Additional course">

    <button
      type="button"
      (click)="removeCourse(i)">
      Remove
    </button>

  </div>

</div>

  <br>


  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

</form>
