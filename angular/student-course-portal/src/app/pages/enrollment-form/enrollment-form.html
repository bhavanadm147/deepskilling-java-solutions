<h1>Student Enrollment Request</h1>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <div>
    <label for="studentName">Student Name:</label>

    <input
      type="text"
      id="studentName"
      name="studentName"
      [(ngModel)]="studentName"
      #nameCtrl="ngModel"
      required
      minlength="3">

    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
      Name is required
    </span>

    <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
    </span>
  </div>

  <br>

  <div>
    <label for="studentEmail">Student Email:</label>

    <input
      type="email"
      id="studentEmail"
      name="studentEmail"
      [(ngModel)]="studentEmail"
      #emailCtrl="ngModel"
      required
      email>

    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
      Email is required
    </span>

    <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
      Enter a valid email address
    </span>
  </div>

  <br>

  <div>
    <label for="courseId">Course ID:</label>

    <input
      type="number"
      id="courseId"
      name="courseId"
      [(ngModel)]="courseId"
      #courseCtrl="ngModel"
      required>

    <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
      Course ID is required
    </span>
  </div>

  <br>

  <div>
    <label for="preferredSemester">Preferred Semester:</label>

    <select
      id="preferredSemester"
      name="preferredSemester"
      [(ngModel)]="preferredSemester"
      required>

      <option value="">Select Semester</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>

    </select>
  </div>

  <br>

  <div>
    <input
      type="checkbox"
      id="agreeToTerms"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      #termsCtrl="ngModel"
      required>

    <label for="agreeToTerms">
      I agree to the terms and conditions
    </label>

    <span *ngIf="termsCtrl.touched && termsCtrl.invalid">
      You must agree to the terms
    </span>
  </div>

  <br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

  <button
    type="button"
    (click)="resetForm(enrollForm)">
    Reset
  </button>

</form>

<div *ngIf="submitted">
  <h3>Enrollment request submitted successfully!</h3>
</div>
